<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>N+H ♡</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Tangerine">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #F8C8DC;
      font-family: 'Tangerine', serif;
      padding: 3rem 1.5rem 6rem;
      overflow-x: hidden;
    }

    h1 {
      text-align: center;
      font-size: 72px;
      color: #fff;
      font-weight: 400;
      margin-bottom: 0.1rem;
      letter-spacing: 0.02em;
    }

    .subtitle {
      text-align: center;
      font-size: 32px;
      color: rgba(255,255,255,0.75);
      margin-bottom: 4rem;
    }

    /* Music player */
    .music-btn {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #fff;
      border: 1.5px solid #f0a0bf;
      color: #c06080;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
      transition: transform 0.2s;
      z-index: 100;
    }
    .music-btn:hover { transform: scale(1.08); }

    /* Scrapbook layout */
    .scrapbook {
      max-width: 900px;
      margin: 0 auto;
      position: relative;
    }

    .photo-wrap {
      display: inline-block;
      position: relative;
      margin: 1.5rem;
      cursor: default;
      transition: transform 0.25s ease;
    }
    .photo-wrap:hover {
      transform: scale(1.04) rotate(0deg) !important;
      z-index: 10;
    }

    .photo-wrap img {
      display: block;
      width: 220px;
      height: 270px;
      object-fit: cover;
      object-position: center top;
      border-radius: 4px;
      border: 5px solid #fff;
      box-shadow: 0 4px 18px rgba(0,0,0,0.13);
    }

    .photo-wrap .caption {
      text-align: center;
      font-size: 28px;
      color: #fff;
      margin-top: 0.4rem;
      text-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    /* Scatter rotations — alternating classes */
    .photo-wrap:nth-child(4n+1) { transform: rotate(-4deg); }
    .photo-wrap:nth-child(4n+2) { transform: rotate(3deg);  }
    .photo-wrap:nth-child(4n+3) { transform: rotate(-2deg); }
    .photo-wrap:nth-child(4n+4) { transform: rotate(5deg);  }

    /* Vertical offset to make it feel scattered */
    .photo-wrap:nth-child(3n+1) { top: 0px; }
    .photo-wrap:nth-child(3n+2) { top: 40px; }
    .photo-wrap:nth-child(3n+3) { top: 15px; }
  </style>
</head>
<body>

  <h1>Hugo & Niki</h1>
  <div class="subtitle">Våra Minnen</div>

  <audio id="bg-music" loop>
    <!-- Put your music file in the same folder and change the src -->
    <source src="music.mp3" type="audio/mpeg" />
  </audio>

  <div class="scrapbook">

    <!-- Add or remove photo-wrap blocks as needed -->
    <!-- Change src to your image filename, and the caption to whatever you want -->

    <div class="photo-wrap">
      <img src="DSCF0264.JPG" alt="" />
      <div class="caption"></div>
    </div>

    <div class="photo-wrap">
      <img src="photo2.jpg" alt="" />
      <div class="caption">din caption här</div>
    </div>

    <div class="photo-wrap">
      <img src="photo3.jpg" alt="" />
      <div class="caption">din caption här</div>
    </div>

    <div class="photo-wrap">
      <img src="photo4.jpg" alt="" />
      <div class="caption">din caption här</div>
    </div>

    <div class="photo-wrap">
      <img src="photo5.jpg" alt="" />
      <div class="caption">din caption här</div>
    </div>

    <div class="photo-wrap">
      <img src="photo6.jpg" alt="" />
      <div class="caption">din caption här</div>
    </div>

    <div class="photo-wrap">
      <img src="photo7.jpg" alt="" />
      <div class="caption">din caption här</div>
    </div>

    <div class="photo-wrap">
      <img src="photo8.jpg" alt="" />
      <div class="caption">din caption här</div>
    </div>

  </div>

  <!-- Music toggle button -->
  <button class="music-btn" id="musicBtn" title="Musik">▶</button>

  <script>
    const audio = document.getElementById('bg-music');
    const btn   = document.getElementById('musicBtn');
    let playing = false;

    btn.addEventListener('click', () => {
      if (playing) {
        audio.pause();
        btn.textContent = '▶';
      } else {
        audio.play();
        btn.textContent = '⏸';
      }
      playing = !playing;
    });
  </script>

</body>
</html>
