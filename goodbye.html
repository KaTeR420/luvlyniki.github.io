<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hejdå</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Tangerine">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F8C8DC;
      font-family: 'Tangerine', serif;
      padding: 2rem 1.5rem;
      text-align: center;
    }

    .card {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .heart {
      font-size: 64px;
      animation: pulse 1.8s ease infinite;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.12); }
    }

    h1 {
      font-size: 72px;
      color: #fff;
      font-weight: 400;
    }

    .divider {
      width: 60px;
      height: 1.5px;
      background: rgba(255,255,255,0.5);
      border-radius: 2px;
    }

    .msg {
      font-size: 38px;
      color: #fff;
      line-height: 1.4;
      max-width: 360px;
    }

    .small {
      font-size: 28px;
      color: rgba(255,255,255,0.7);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="heart"></div>
    <h1>Det var slutet</h1>
    <div class="divider"></div>
    <div class="msg">Hoppas du gillade det</div>
    <div class="small">Hejdå för nu <3</div>
  </div>
</body>
</html>
