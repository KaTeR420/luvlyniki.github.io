<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F8C8DC;
      font-family: 'Lato', sans-serif;
      padding: 1.5rem;
    }

    .card {
      text-align: center;
      width: 100%;
      max-width: 340px;
    }

    .title {
      font-size: 20px;
      font-weight: 300;
      color: #333;
      margin-bottom: 0.3rem;
    }

    .subtitle {
      font-size: 13px;
      color: #999;
      margin-bottom: 1.75rem;
    }

    .pw-input {
      width: 100%;
      padding: 11px 16px;
      font-size: 15px;
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      border: 1.5px solid #f0a0bf;
      border-radius: 50px;
      background: #fff;
      color: #333;
      outline: none;
      text-align: center;
      margin-bottom: 0.65rem;
      transition: border-color 0.2s;
    }
    .pw-input:focus { border-color: #e07090; }
    .pw-input.shake {
      animation: shake 0.35s ease;
      border-color: #e07070;
    }
    .pw-input.success { border-color: #70b090; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    .enter-btn {
      width: 100%;
      padding: 11px 16px;
      font-size: 13px;
      font-family: 'Lato', sans-serif;
      font-weight: 400;
      letter-spacing: 0.08em;
      border: 1.5px solid #f0a0bf;
      border-radius: 50px;
      background: #fff;
      color: #c06080;
      cursor: pointer;
      transition: background 0.18s, transform 0.1s;
    }
    .enter-btn:hover { background: #fce8f0; }
    .enter-btn:active { transform: scale(0.98); }

    .msg {
      font-size: 12px;
      margin-top: 0.85rem;
      min-height: 18px;
      color: #aaa;
    }
    .msg.error { color: #c06060; }
    .msg.ok    { color: #60a080; }

    .home-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      animation: fadeIn 0.6s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .home-screen .big-heart {
      font-size: 48px;
      animation: pulse 1.6s ease infinite;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }
    .home-screen .welcome {
      font-size: 22px;
      font-weight: 300;
      color: #333;
    }
    .home-screen .tagline {
      font-size: 13px;
      color: #999;
    }
  </style>
</head>
<body>

  <div class="card">

    <div id="lockCard">
      <span class="heart">♡</span>
      <div class="title">Hey, you</div>
      <div class="subtitle">Type the secret to get in</div>
      <input class="pw-input" id="pwInput" type="text" placeholder="…" autocomplete="off" spellcheck="false" />
      <button class="enter-btn" id="enterBtn">Come in</button>
      <div class="msg" id="msg">psst — it's two names</div>
    </div>

    <div class="home-screen" id="homeScreen">
      <div class="big-heart">♡</div>
      <div class="welcome">Hugo & Niki</div>
      <div class="tagline">welcome home ♡</div>
    </div>

  </div>

  <script>
    const input = document.getElementById('pwInput');
    const btn   = document.getElementById('enterBtn');
    const msg   = document.getElementById('msg');
    const lock  = document.getElementById('lockCard');
    const home  = document.getElementById('homeScreen');
    const PASS  = 'Hugo och Niki';

    function attempt() {
      if (input.value.trim() === PASS) {
        input.classList.add('success');
        msg.textContent = 'there you are ♡';
        msg.className = 'msg ok';
        setTimeout(() => {
          lock.style.display = 'none';
          home.style.display = 'flex';
        }, 600);
      } else {
        input.classList.remove('shake');
        void input.offsetWidth;
        input.classList.add('shake');
        msg.textContent = 'hmm, not quite — try again';
        msg.className = 'msg error';
        setTimeout(() => input.classList.remove('shake'), 400);
      }
    }

    btn.addEventListener('click', attempt);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') attempt(); });
  </script>

</body>
</html>
